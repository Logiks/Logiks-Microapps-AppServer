<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logiks API Explorer</title>
  <!-- Swagger UI (loaded from CDN; needs internet for the UI assets. To run fully
       offline, download swagger-ui-dist@5 next to this file and repoint the two URLs). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
           padding: 12px 18px; background: #24292f; color: #fff; position: sticky; top: 0; z-index: 5; }
    .bar strong { font-size: 15px; margin-right: 6px; }
    .bar input { flex: 1; min-width: 220px; padding: 8px 10px; border: 1px solid #444; border-radius: 8px;
                 background: #0d1117; color: #e6edf3; font-size: 13px; }
    .bar input.token { flex: 0 1 320px; }
    .bar button { padding: 8px 16px; border: 0; border-radius: 8px; background: #6366f1; color: #fff;
                  font-weight: 600; cursor: pointer; }
    .bar button:hover { background: #4f46e5; }
    .hint { padding: 8px 18px; font-size: 12px; color: #57606a; background: #f6f8fa; border-bottom: 1px solid #d0d7de; }
    #swagger-ui { max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>Logiks API Explorer</strong>
    <input id="specUrl" placeholder="OpenAPI spec URL">
    <input id="token" class="token" placeholder="Bearer token or API key (optional)">
    <button id="load">Load</button>
  </div>
  <div class="hint">
    Loads the live OpenAPI spec from this server and lets you call endpoints. Paste a token to authorize requests
    (used both for fetching the spec and for "Try it out"). The spec endpoint is available on development/staging builds.
  </div>
  <div id="swagger-ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    (function () {
      var origin = window.location.origin;
      var params = new URLSearchParams(window.location.search);

      // sensible defaults; override via the bar or ?spec= / ?token=
      var defaultSpec = origin + "/api/developers.swagger/openapi.json";
      var specInput = document.getElementById("specUrl");
      var tokenInput = document.getElementById("token");
      specInput.value = params.get("spec") || localStorage.getItem("logiks-spec") || defaultSpec;
      tokenInput.value = params.get("token") || localStorage.getItem("logiks-token") || "";

      function token() { return tokenInput.value.trim(); }

      function authHeader(req) {
        var t = token();
        if (t) {
          // send as Bearer; an API key also works on most endpoints via this header
          req.headers["Authorization"] = t.toLowerCase().indexOf("bearer ") === 0 ? t : ("Bearer " + t);
          req.headers["X-API-Key"] = t.replace(/^bearer\s+/i, "");
        }
        return req;
      }

      function render() {
        localStorage.setItem("logiks-spec", specInput.value.trim());
        localStorage.setItem("logiks-token", token());
        window.ui = SwaggerUIBundle({
          url: specInput.value.trim(),
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "BaseLayout",
          tryItOutEnabled: true,
          persistAuthorization: true,
          requestInterceptor: authHeader   // applies to the spec fetch and to Try-it calls
        });
      }

      document.getElementById("load").addEventListener("click", render);
      specInput.addEventListener("keydown", function (e) { if (e.key === "Enter") render(); });
      tokenInput.addEventListener("keydown", function (e) { if (e.key === "Enter") render(); });
      render();
    })();
  </script>
</body>
</html>
